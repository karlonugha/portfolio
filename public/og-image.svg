<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0f1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="avatarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow1" cx="25%" cy="35%" r="40%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="glow2" cx="75%" cy="65%" r="40%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Glow orbs -->
  <rect width="1200" height="630" fill="url(#glow1)" />
  <rect width="1200" height="630" fill="url(#glow2)" />

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)" />

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accent)" />

  <!-- Avatar circle -->
  <circle cx="600" cy="195" r="52" fill="url(#avatarGrad)" />
  <text x="600" y="213" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="bold" fill="white">K</text>

  <!-- Name -->
  <text x="600" y="295" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="bold" fill="white" letter-spacing="1">Karl Onugha</text>

  <!-- Title with gradient bar -->
  <rect x="480" y="315" width="240" height="2" fill="url(#accent)" rx="1" />
  <text x="600" y="350" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#9ca3af">Cloud-Focused Developer</text>

  <!-- Tech tags -->
  <!-- Node.js -->
  <rect x="255" y="385" width="95" height="32" rx="16" fill="rgba(14,165,233,0.12)" stroke="rgba(14,165,233,0.3)" stroke-width="1" />
  <text x="302" y="406" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#38bdf8">Node.js</text>

  <!-- AWS -->
  <rect x="365" y="385" width="75" height="32" rx="16" fill="rgba(14,165,233,0.12)" stroke="rgba(14,165,233,0.3)" stroke-width="1" />
  <text x="402" y="406" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#38bdf8">AWS</text>

  <!-- React -->
  <rect x="455" y="385" width="80" height="32" rx="16" fill="rgba(124,58,237,0.12)" stroke="rgba(124,58,237,0.3)" stroke-width="1" />
  <text x="495" y="406" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#a78bfa">React</text>

  <!-- PostgreSQL -->
  <rect x="550" y="385" width="105" height="32" rx="16" fill="rgba(124,58,237,0.12)" stroke="rgba(124,58,237,0.3)" stroke-width="1" />
  <text x="602" y="406" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#a78bfa">PostgreSQL</text>

  <!-- Express -->
  <rect x="670" y="385" width="85" height="32" rx="16" fill="rgba(14,165,233,0.12)" stroke="rgba(14,165,233,0.3)" stroke-width="1" />
  <text x="712" y="406" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#38bdf8">Express</text>

  <!-- Linux -->
  <rect x="770" y="385" width="78" height="32" rx="16" fill="rgba(124,58,237,0.12)" stroke="rgba(124,58,237,0.3)" stroke-width="1" />
  <text x="809" y="406" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#a78bfa">Linux</text>

  <!-- Tagline -->
  <text x="600" y="470" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#6b7280">Building and deploying scalable web applications</text>
  <text x="600" y="494" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#6b7280">with Node.js and modern cloud platforms</text>

  <!-- Location -->
  <text x="600" y="545" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#4b5563">📍 Cork, Ireland</text>

  <!-- Bottom accent line -->
  <rect x="0" y="627" width="1200" height="3" fill="url(#accent)" />
</svg>
